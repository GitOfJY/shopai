version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shopai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: shopai1234
      MYSQL_DATABASE: shopai
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: shopai-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: shopai-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: shopai
      RABBITMQ_DEFAULT_PASS: shopai1234
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  mysql-data: